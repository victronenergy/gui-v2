<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--
      Set visual viewport size for mobile devices to the device size,
      witch results in a scale of 1 and a 1:1 mapping between CSS pixels
      and Qt device independent pixels.
    -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=no, viewport-fit=cover"/>

    <title>Victron GUIv2</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="manifest" href="icons/manifest.json">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#1f2535">
    <meta name="msapplication-TileColor" content="#1f2535">
    <meta name="theme-color" content="#1f2535">
    <style>
      /* Make the html body cover the entire (visual) viewport with no scroll bars. */
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        background: #000000;
        color: #FAF9F5;
        font-family: "Roboto", sans-serif;
      }
      a,
      a:visited,
      a:hover,
      a:active {
        color: #387DC5;
      }
      #device-frame {
        display: none;
        z-index: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 840px;
      }
      #wrapper-inner {
          background: #000;
          color: #969591;
      }
      @media screen and (min-width: 1400px) and (min-height: 900px) {
        #device-frame {
          display: block;
        }
        #wrapper-inner {
          outline: 1px solid #141414;
        }
      }
      /*
        Apply device-frame only on browsers that support aspect-ratio
        else on some older MFD devices the GUI will not be shown at all
      */
      @supports (aspect-ratio: 1/1) {
        #wrapper-outer  {
          width: 100%;
          height: 100%;
          max-height: 100dvh;
          margin: 0;
          padding: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          position: absolute;
          top: 0;
          left: 0;
        }
        #wrapper-inner {
          width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right));
          max-width: 1024px;
          max-height: calc(100% - env(safe-area-inset-bottom));
          aspect-ratio: 1024/600;
          position: relative;
          text-align: center;
        }
        /*
         * remove aspect ratio on mobile devices in portrait mode
         * this allows to display the WASM portrait layout in full screen
        */
        @media screen and (max-width: 576px) and (orientation: portrait) {
          #wrapper-inner {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: unset;
          }
        }
      }
      #qtspinner {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      #qtstatus {
        min-height: 20px;
        padding-top: 28px;
      }
      #screen {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        margin: 0;
        z-index: 2;
      }
      @media (prefers-color-scheme: light) {
        html, body {
          background: #E6E5E1;
          color: #1D1D1B;
        }
        #wrapper-inner {
          background: #E6E5E1;
          color: #64635F;
        }
        #loading-bar-text {
          color: #64635F !important;
        }
        #logo-dark {
          visibility: hidden !important;
        }
        #logo-light {
          visibility: visible !important;
        }
      }
      /* Force dark or light color scheme */
      html[data-forced-scheme="dark"], html[data-forced-scheme="dark"] body {
          background: #000000 !important;
          color: #FAF9F5 !important;
      }
      html[data-forced-scheme="dark"] #wrapper-inner {
          background: #000 !important;
          color: #969591 !important;
      }
      html[data-forced-scheme="dark"] #loading-bar-text {
          color: #969591 !important;
      }
      html[data-forced-scheme="dark"] #logo-dark {
          visibility: visible !important;
      }
      html[data-forced-scheme="dark"] #logo-light {
          visibility: hidden !important;
      }

      html[data-forced-scheme="light"], html[data-forced-scheme="light"] body {
          background: #E6E5E1 !important;
          color: #1D1D1B !important;
      }
      html[data-forced-scheme="light"] #wrapper-inner {
          background: #E6E5E1 !important;
          color: #64635F !important;
      }
      html[data-forced-scheme="light"] #loading-bar-text {
          color: #64635F !important;
      }
      html[data-forced-scheme="light"] #logo-dark {
          visibility: hidden !important;
      }
      html[data-forced-scheme="light"] #logo-light {
          visibility: visible !important;
      }
    </style>
    <script>
      (function() {
          const params = new URLSearchParams(window.location.search);
          if (params.has('colorScheme')) {
              const scheme = params.get('colorScheme').toLowerCase();
              if (scheme === 'dark' || scheme === 'light') {
                  document.documentElement.setAttribute('data-forced-scheme', scheme);
              }
          }
      })();
    </script>
  </head>
  <body onload="init()">
    <img id="device-frame" src="device-frame.svg">
    <div id="wrapper-outer">
      <div id="wrapper-inner">
        <figure id="qtspinner">
          <svg width="100%" height="100%" viewBox="0 0 1024 600" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <image id="logo-dark" xlink:href="victronenergy.svg" x="368" y="248" width="284" height="55"/>
            <image id="logo-light" style="visibility: hidden" xlink:href="victronenergy-light.svg" x="368" y="248" width="284" height="55"/>
            <text fill="#969591" xml:space="preserve" style="white-space: pre" font-family="'Roboto', sans-serif" font-size="18" letter-spacing="0em" text-anchor="middle">
              <tspan x="512" y="385" id="loading-bar-text">Downloading...</tspan>
            </text>
            <rect id="loading-bar-container" x="280" y="348" width="464" height="8" rx="4" fill="#387DC5" fill-opacity="0.3"/>
            <rect id="loading-bar" x="280" y="348" width="0" height="8" rx="4" fill="#387DC5"/>
          </svg>
          <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
        </figure>
        <div id="screen"></div>
      </div>
    </div>

    <script type="text/javascript">
        async function check(url, attempt, delay, available, unavailable)
        {
            try {
                const response = await fetch(url, {cache: "no-cache"});
                if (response.ok) {
                    available();
                    return;
                }
            } catch (error) {
            }

            if (attempt == 0 || --attempt == 0) {
                unavailable();
                return;
            }

            setTimeout(check, delay, url, attempt, delay, available, unavailable);
        }

        // Reload the page and make sure it is available, since the webserver might start up.
        function reload()
        {
            check(location.href, 30, 1000, (function() { location.reload(); }), (function() { console.log("Failed to reload gui-v2: web server unavailable"); }) );
        }

        // Helper functions for cookies
        function setCookie(name, value, days) {
            // Check if document.cookie is available, since it might not be on some older MFD devices
            // or if the browser has disabled cookies.
            if (typeof document.cookie === "undefined") return;
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days*24*60*60*1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/";
        }

        function getCookie(name) {
            // Check if document.cookie is available, since it might not be on some older MFD devices
            // or if the browser has disabled cookies.
            if (typeof document.cookie === "undefined") return null;
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i];
                while (c.charAt(0)==' ') c = c.substring(1,c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
            }
            return null;
        }

        class PreloadWasmError extends Error {
            constructor(message) {
                super(message);
                this.name = "PreloadWasmError";
            }
        }

        function showLoadError(e, title) {
            const wrapper_inner = document.querySelector('#wrapper-inner');
            wrapper_inner.innerHTML = `
                <div style="color: red; font-size: 20px; margin: 20px 25px 0;">
                  <b>${title}</b><br><br>
                  <b>URL:</b> <i>${window.location.href}</i><br>
                  <b>User Agent:</b> <i>${navigator.userAgent}</i><br>
                  <b>${e.name}:</b> <i>${e.message}</i><br>
                  <b>Stack:</b> <i>${e.stack}</i>
                </div>`;

            if ((
                e.message.toLowerCase().includes('network')
                || e.message.toLowerCase().includes('error in input stream')
            ) && !window.location.search.includes('download=vrm')) {
                const params = new URLSearchParams(window.location.search);
                params.set('download', 'vrm');
                const link = `${window.location.pathname}?${params.toString()}`;
                wrapper_inner.innerHTML += `
                    <div style="margin: 20px 50px 0;">
                      It looks like the network connection is too slow or unstable to download the UI.<br><br>
                      <a href="${link}">Click here</a> to try downloading the UI web application from the VRM servers on the internet,
                      instead from the GX device. The data connection will still be direct to the GX device: no connection between the VRM Portal
                      and the GX device is required.<br>
                      <br>
                      This split-method (download UI from internet & direct data connection) is for systems with a limited network connection
                      between the GX device and the internet. For example a GX device with a GSM connection and a client connected over VPN.
                    </div>`;
            }
        }

        async function preloadWasm(url, onProgress) {
            try {
                let total = null;
                // This is needed, since the reported size is the compressed size
                // but the downloaded size is shown as uncompressed size, since the browser decompresses it
                const sizeResp = await fetch('venus-gui-v2.wasm.size');

                // check if query parameter download is set to 'vrm'
                const searchParams = new URLSearchParams(window.location.search);
                if (searchParams.has('download') && searchParams.get('download').toLowerCase() === 'vrm') {

                    console.log("Download from VRM server forced by URL parameter");

                    // Download hash file from GX device
                    const wasmHash = await fetch('venus-gui-v2.wasm.sha256');
                    // Extract the hash from the file
                    const hash = (await wasmHash.text()).trim().split(' ')[0];

                    // Check if file is available on VRM server
                    // It fetches automatically the gzipped version
                    const vrmWasmUrl = "https://updates.victronenergy.com/venus-gui/" + hash + "/venus-gui-v2.wasm"

                    const vrmResp = await fetch(vrmWasmUrl, { method: 'HEAD' });
                    if (!vrmResp.ok) {
                        console.warn(`WASM file not found on VRM server (HTTP ${vrmResp.status}), falling back to local download`);
                    } else {
                        // If available, change the url to the VRM download url
                        url = vrmWasmUrl;

                    }
                }

                // Load WASM after the size is fetched, else the size is not downloaded
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch WASM");

                if (sizeResp.ok) {
                    total = parseInt(await sizeResp.text(), 10);
                } else {
                    // should not be needed, but just in case?
                    const estimatedCompressionRatio = 0.4; // Assume 40% as compressed size
                    const contentLength = response.headers.get('content-length');
                    total = contentLength ? parseInt(contentLength, 10) / estimatedCompressionRatio : null;
                    console.warn("venus-gui-v2.wasm.size not found, using estimated size of " + (total ? (total / 1024).toFixed(2) + ' KB' : 'unknown'));
                }

                const reader = response.body.getReader();
                let received = 0;
                let chunks = [];
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    onProgress(received, total);
                }
                let wasmBinary = new Uint8Array(received);
                let pos = 0;
                for (let chunk of chunks) {
                    wasmBinary.set(chunk, pos);
                    pos += chunk.length;
                }
                return wasmBinary;
            } catch (e) {
                console.error(e);
                console.error(e.stack);
                showLoadError(e, 'Error pre-loading application!');
                throw new PreloadWasmError(e);
            }
        }

        // Reposition the spinner SVG elements to match the QML SplashView layout.
        // In portrait the elements are anchored to the screen centre with offsets
        // (matching Portrait.json geometry values). In landscape the values match
        // SevenInch.json geometry on a 1024x600 coordinate space.
        function applySpinnerLayout() {
            const wrapper = document.querySelector('#wrapper-inner');
            const { width: w, height: h } = wrapper.getBoundingClientRect();
            const svg = document.querySelector('#qtspinner svg');

            if (h <= w) {
                // Landscape: SevenInch.json geometry values (viewBox matches 1024x600 screen)
                //   geometry_splashView_logo_verticalCenterOffset:       -25  → y = 300-25-55/2 = 248
                //   geometry_splashView_logo_horizontalCenterOffset:      -2  → x = 512-2-284/2 = 368
                //   geometry_splashView_progressBar_verticalCenterOffset: +52 → y = 300+52-8/2 = 348
                svg.setAttribute('viewBox', '0 0 1024 600');
                [['logo-dark', 368, 248, 284, 55],
                 ['logo-light', 368, 248, 284, 55]].forEach(([id, x, y, lw, lh]) => {
                    const el = document.getElementById(id);
                    el.setAttribute('x', x); el.setAttribute('y', y);
                    el.setAttribute('width', lw); el.setAttribute('height', lh);
                });
                ['loading-bar-container', 'loading-bar'].forEach(id => {
                    const el = document.getElementById(id);
                    el.setAttribute('x', 280); el.setAttribute('y', 348); el.setAttribute('height', 8);
                });
                document.getElementById('loading-bar-container').setAttribute('width', 464);
                const textEl = document.querySelector('#qtspinner svg text');
                textEl.setAttribute('text-anchor', 'middle');
                const tspan = document.getElementById('loading-bar-text');
                tspan.setAttribute('x', 512); tspan.setAttribute('y', 385);
                return;
            }

            // Portrait: position elements matching QML Portrait.json geometry values:
            //   geometry_splashView_logo_verticalCenterOffset:       -25
            //   geometry_splashView_logo_horizontalCenterOffset:      -2
            //   geometry_splashView_progressBar_verticalCenterOffset: +50
            svg.setAttribute('viewBox', `0 0 ${Math.round(w)} ${Math.round(h)}`);
            const cx = w / 2, cy = h / 2;
            const logoW = 284, logoH = 55;
            const barW = Math.min(464, w - 32), barH = 8;

            ['logo-dark', 'logo-light'].forEach(id => {
                const el = document.getElementById(id);
                el.setAttribute('x', Math.round(cx - logoW / 2 - 2));
                el.setAttribute('y', Math.round(cy - 25 - logoH / 2));
                el.setAttribute('width', logoW); el.setAttribute('height', logoH);
            });

            const barX = Math.round(cx - barW / 2);
            const barY = Math.round(cy + 50 - barH / 2);
            ['loading-bar-container', 'loading-bar'].forEach(id => {
                const el = document.getElementById(id);
                el.setAttribute('x', barX); el.setAttribute('y', barY); el.setAttribute('height', barH);
            });
            document.getElementById('loading-bar-container').setAttribute('width', barW);

            // Text: geometry_splashView_progressText_topMargin (12) + cap-height (~13)
            const textEl = document.querySelector('#qtspinner svg text');
            textEl.setAttribute('text-anchor', 'middle');
            const tspan = document.getElementById('loading-bar-text');
            tspan.setAttribute('x', Math.round(cx));
            tspan.setAttribute('y', Math.round(barY + barH + 29));
        }

        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const deviceFrame = document.querySelector('#device-frame');
            const wrapper_inner = document.querySelector('#wrapper-inner');
            const loadingBarContainer = document.getElementById('loading-bar-container');
            const loadingBar = document.getElementById('loading-bar');
            const loadingBarText = document.getElementById('loading-bar-text');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.visibility = 'hidden');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.visibility = 'visible';
            }

            const searchParams = new URLSearchParams(window.location.search);

            // If mqtt param is set: use the provided MQTT address
            // If id/shard params are set: gui-v2 will use VRM
            // If none of these are set, will use a default MQTT address.
            const needsDefaultArgs = !searchParams.has("mqtt") && !searchParams.has("id") && !searchParams.has("shard") && !searchParams.has("mock");

            // Options to change display size and border
            const displayModes = ['default', 'fullscreen', 'portrait', 'noframe', 'frame'];
            const displayMode = displayModes.find(m => searchParams.has(m)) || getCookie('venus-gui-v2-css-display');

            switch (displayMode) {
                case 'default':
                    setCookie('venus-gui-v2-css-display', 'default', 0);
                    break;
                case 'fullscreen':
                    wrapper_inner.style.maxWidth = '100%';
                    wrapper_inner.style.height = '100%';
                    deviceFrame.style.visibility = 'hidden';
                    deviceFrame.style.display = 'none';
                    setCookie('venus-gui-v2-css-display', 'fullscreen', 365);
                    break;
                case 'portrait':
                    wrapper_inner.style.width = '100%';
                    wrapper_inner.style.height = '100%';
                    wrapper_inner.style.maxWidth = '100%';
                    wrapper_inner.style.maxHeight = '100%';
                    wrapper_inner.style.aspectRatio = 'unset';
                    deviceFrame.style.visibility = 'hidden';
                    deviceFrame.style.display = 'none';
                    setCookie('venus-gui-v2-css-display', 'portrait', 365);
                    break;
                case 'noframe':
                    deviceFrame.style.visibility = 'hidden';
                    wrapper_inner.style.outline = 'none';
                    setCookie('venus-gui-v2-css-display', 'noframe', 365);
                    break;
                case 'frame':
                    deviceFrame.style.visibility = 'visible';
                    deviceFrame.style.display = 'block';
                    setCookie('venus-gui-v2-css-display', 'frame', 365);
                    break;
            }

            applySpinnerLayout();
            window.addEventListener('resize', applySpinnerLayout);

            try {
                showUi(spinner);
                loadingBar.width.baseVal.value = '0';
                loadingBarText.textContent = 'Downloading...';

                // Preload WASM with progress
                const wasmBinary = await preloadWasm('venus-gui-v2.wasm', (received, total) => {
                    if (total) {
                        const ratio = Math.min(received / total, 1);
                        const percent = (ratio * 100).toFixed(1);
                        const barWidth = ratio * loadingBarContainer.width.baseVal.value;
                        loadingBar.width.baseVal.value = barWidth;
                        loadingBarText.textContent = `Downloading... ${percent}%`;
                    // If total is unknown, show the received size in MB
                    } else {
                        loadingBar.width.baseVal.value = loadingBarContainer.width.baseVal.value;
                        loadingBarText.textContent =
                            `Downloading... ${(received/(1024*1024)).toFixed(2)} MB`;
                    }
                });

                loadingBar.width.baseVal.value = loadingBarContainer.width.baseVal.value;
                loadingBarText.textContent = 'Loading application...';

                let defaultMqttArg = (location.protocol === 'https:' ? 'wss://' : 'ws://') + document.location.host + '/websocket-mqtt'
                let argumentList = needsDefaultArgs ? ['--mqtt', defaultMqttArg] : [];
                if (searchParams.has('mock')) {
                    argumentList.push('--mock');
                    const mockConf = searchParams.get('mock');
                    if (mockConf) {
                        argumentList.push('--mock-conf', mockConf);
                    }
                } else {
                    argumentList.push(
                        '--nodeRedUrl', 'https://' + document.location.host + ':1881',
                        '--signalKUrl', 'http://' + document.location.host + ':3000',
                    );
                }

                const instance = await qtLoad({
                    arguments: argumentList,
                    wasmBinary: wasmBinary,
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            let exitMsg = 'Application exit';
                            if (exitData.code !== undefined) exitMsg += ` with code ${exitData.code}`;
                            if (exitData.text !== undefined) exitMsg += ` (${exitData.text})`;
                            loadingBarText.textContent = exitMsg;
                            showUi(spinner);
                        },
                        entryFunction: window.venus_gui_v2_entry, // 'venus_gui_v2_entry' comes from CI, see https://github.com/victronenergy/gui-v2/blob/main/.github/workflows/build-wasm.yml#L113
                        containerElements: [screen],
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
                if (e instanceof PreloadWasmError) {
                    // preloadWasm already showed the error
                    console.warn("PreloadWasmError caught, no need to show again");
                } else {
                    showLoadError(e, 'Error loading application!');
                }
            }
        }
    </script>
    <script type="text/javascript" src="venus-gui-v2.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
    <script type="text/javascript">
        // Note: VRM does not use this index.html, so if you add some
        // control variables here, make sure you coordinate with VRM.
        var guiv2initialized = false
        var watchdogHit = false // this gets set to 'true' by a timer via BackendConnection::hitWatchdog()
        var reloadTriggered = false // this gets set to 'true' if reload() is called to prevent multiple reload calls
        console.log("starting watchdog timer")
        setInterval(checkWatchdog, 10000)

        function checkWatchdog()
        {
            if (!watchdogHit && !reloadTriggered && guiv2initialized) {
                console.error("Watchdog timer expired - reloading page")
                reload()
                reloadTriggered = true
            }
            watchdogHit = false
        }
    </script>
  </body>
</html>
